name: Validate Ontology

on:
  pull_request:
    branches:
      - '**'  # Run on PRs to any branch

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --python 3.12 --no-install-project
      
      - name: Validate ontology files
        run: uv run --python 3.12 --no-project python scripts/validate_ontology.py
