name: Validate Ontology

on:
  pull_request:
    branches:
      - '**'  # Run on PRs to any branch
  push:
    branches:
      - '**'  # Run on all branches

permissions:
  contents: read

# Use concurrency to prevent duplicate runs when both push and pull_request fire
# For PRs, use the head branch ref so push and pull_request share the same group
# For direct pushes, use the branch ref
concurrency:
  group: validate-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      
      - name: Set up Python
        run: uv python install 3.12
      
      - name: Install dependencies
        run: uv sync --python 3.12 --no-install-project
      
      - name: Validate ontology files
        run: uv run --python 3.12 --no-project python scripts/validate_ontology.py
